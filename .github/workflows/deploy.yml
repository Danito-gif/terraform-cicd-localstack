name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Iniciar LocalStack
        run: |
          docker run -d --name localstack \
            -e SERVICES=ssm \
            -e GATEWAY_LISTEN=0.0.0.0:4566 \
            -p 4566:4566 \
            localstack/localstack:3.0

      - name: Ver logs de LocalStack
        run: |
          sleep 10
          docker ps
          docker logs localstack

      - name: Esperar LocalStack
        run: |
          for i in {1..40}; do
            if curl -f http://localhost:4566/_localstack/health; then
              echo "LocalStack está listo"
              exit 0
            fi
            echo "Esperando LocalStack..."
            sleep 3
          done
          docker logs localstack
          exit 1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
